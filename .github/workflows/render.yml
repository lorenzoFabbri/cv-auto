name: Render CV

on:
  push:
    branches: [main]
  schedule:
    # Every Monday at 08:00 UTC — picks up new ORCID entries automatically
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # ── 1. Lint & format ────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.6"
          use-public-rspm: true

      - uses: r-lib/actions/setup-renv@v2

      # air: fast R formatter (Rust-based, from Posit)
      - name: Install air
        run: |
          curl -LsSf https://github.com/posit-dev/air/releases/latest/download/air-installer.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Check formatting with air
        run: air format --check R/

      - name: Install lintr
        run: Rscript -e "install.packages('lintr')"

      - name: Lint with lintr
        run: Rscript -e "lintr::lint_dir('R/')"

  # ── 2. Render all formats ───────────────────────────────────────────────
  render:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.6"
          use-public-rspm: true

      - uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: "pre-release"  # needed for typst support

      - uses: r-lib/actions/setup-renv@v2

      - name: Install system fonts (for Typst PDF)
        run: sudo apt-get install -y fonts-noto

      - name: Render CV (HTML + PDF + DOCX)
        run: quarto render
        env:
          # Optional: set for higher ORCID API rate limits
          # ORCID_TOKEN: ${{ secrets.ORCID_TOKEN }}
          QUARTO_PRINT_STACK: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Upload PDF and DOCX as release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cv-outputs
          path: |
            docs/cv-*.pdf
            docs/cv-*.docx

  # ── 3. Deploy to GitHub Pages ───────────────────────────────────────────
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: render
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
